name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      server_url:
        description: "Optional override for Android shell server URL"
        required: false
        type: string
  push:
    branches:
      - main

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Resolve CAP_SERVER_URL
        run: |
          INPUT_URL="${{ github.event.inputs.server_url || '' }}"
          VAR_URL="${{ vars.CAP_SERVER_URL || '' }}"
          if [ -n "$INPUT_URL" ]; then
            echo "CAP_SERVER_URL=$INPUT_URL" >> "$GITHUB_ENV"
          elif [ -n "$VAR_URL" ]; then
            echo "CAP_SERVER_URL=$VAR_URL" >> "$GITHUB_ENV"
          else
            echo "Using hardcoded mobile server URL from scripts/set-cap-server-url.mjs"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Install Capacitor tooling for CI
        run: npm install --no-save @capacitor/cli@6 @capacitor/core@6 @capacitor/android@6 @capacitor/local-notifications@6

      - name: Build release APK
        run: npm run android:ci:apk

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: phoenix-journey-release-apk
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
