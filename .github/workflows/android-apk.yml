name: Build Native Flutter APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-flutter-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build Signed Release APK
        run: bash scripts/flutter-ci-build.sh

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: phoenix-native-release-apk
          path: |
            flutter_app/android/app/build/outputs/apk/release/*.apk
            flutter_app/build/app/outputs/flutter-apk/*.apk
